<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنت غير متصل | المنصة التعليمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #6366f1; --s: #8b5cf6; --bg: #f8fafc; --txt: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: var(--txt); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); max-width: 500px; width: 100%; }
        .icon-wrap { font-size: 5rem; color: #cbd5e1; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        h1 { font-size: 1.8rem; font-weight: 900; color: #1e293b; margin-bottom: 15px; }
        p { color: #64748b; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
        .btn-retry { display: inline-flex; align-items: center; gap: 10px; background: var(--p); color: white; padding: 15px 35px; border-radius: 15px; text-decoration: none; font-weight: 800; transition: 0.3s; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        .btn-retry:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(99, 102, 241, 0.3); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h1>عذراً.. يبدو أنك فقدت الاتصال</h1>
        <p>لا تقلق، يمكنك الاستمرار في تصفح المحتوى الذي تم تحميله مسبقاً، وسنقوم بمزامنة تقدمك بمجرد عودة الإنترنت.</p>
        <a href="javascript:location.reload()" class="btn-retry">
            <i class="fas fa-sync-alt"></i> محاولة الاتصال مجدداً
        </a>
    </div>
</body>
</html>
